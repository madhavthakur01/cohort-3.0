<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game - Watch Now</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Background overlay elements -->
    <div class="bg-gradient"></div>

    <div class="container">
        <!-- HEADER -->
        <header>
            <div class="logo">
                <img src="./images/logo.png" alt="" style="height: 100px;">
            </div>
            <nav>
                <a href="#">About</a>
                <a href="#" class="active">Watch now</a>
                <a href="#">Actors</a>
                <a href="#">Contact</a>
            </nav>
            <div class="menu-icon">
                <i class="fa-solid fa-bars"></i>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main>
            <!-- Left Side: Content -->
            <div class="content-left">
                <div class="main-title-img">
                    <img src="./images/bannerr.png" alt="Squid Game Logo" style="height: 120px;">
                </div>
                
                <p class="description">
                    Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
                    Season 1: 9 Episodes
                </p>

                <div class="action-buttons">
                    <button class="btn-primary">
                        <span class="play-circle"><i class="fa-solid fa-play"></i></span> Play Now
                    </button>
                    <button class="btn-secondary">
                        <i class="fa-solid fa-play" style="font-size: 12px; color: #d82e6d; border: 1px solid #d82e6d; border-radius: 50%; padding: 4px; padding-left: 6px; width: 22px; height: 22px; display:flex; align-items:center; justify-content:center;"></i> Watch Trailer
                    </button>
                </div>
            </div>

            <!-- Right Side: Hero Image -->
            <div class="hero-image-container">
                <div class="scroll-indicator">
                    <span class="scroll-text">SCROLL</span>
                    <div class="scroll-line"></div>
                </div>
                
                <div class="hero-img-wrapper">
                    <img src="./images/main.png" alt="Squid Game Guard" class="hero-img">
                </div>

                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                </div>
            </div>
        </main>

        <!-- BOTTOM CAROUSEL -->
        <section class="bottom-carousel">
            <div class="bg-game-text">GAME</div>
            <div class="carousel-container">
                <div class="thumbnail-card active-card">
                    <img src="images/squid_thumb1.png" alt="Scene 1">
                    <div class="play-overlay">
                        <i class="fa-solid fa-play"></i>
                    </div>
                </div>
                <div class="thumbnail-card">
                    <img src="images/squid_thumb2.png" alt="Scene 2">
                    <div class="play-overlay">
                        <i class="fa-solid fa-play"></i>
                    </div>
                </div>
                <div class="thumbnail-card">
                    <img src="images/squid_thumb3.png" alt="Scene 3">
                    <div class="play-overlay">
                        <i class="fa-solid fa-play"></i>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
